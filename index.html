<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiceMoon 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Vazirmatn',sans-serif;
    direction:rtl;

    min-height:100vh;
    overflow:hidden;

    background:url("https://i.ibb.co/ynHWBxJ1/37885c25-930b-4c57-886c-8a65172ae807.png")
    center/cover no-repeat fixed;

    position:relative;
}

/* TITLE */
.title{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);

    color:white;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);

    padding:10px 20px;
    border-radius:999px;

    font-size:14px;
    z-index:999;
}

/* LAYOUT */
.container{
    position:relative;
    width:100%;
    height:100vh;
}

/* MUSIC CARDS */
.card{
    position:absolute;
    width:230px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;

    padding:12px;
    color:white;

    box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

.cover{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
}

.song-title{
    margin-top:8px;
    font-size:15px;
    font-weight:700;
    text-align:center;
}

.artist{
    font-size:11px;
    opacity:0.7;
    text-align:center;
    margin-bottom:8px;
}

audio{
    width:100%;
}

/* ZIGZAG POSITIONS */
.c1{top:80px; right:20px;}
.c2{top:220px; left:20px;}
.c3{top:360px; right:20px;}
.c4{top:500px; left:20px;}

/* BACKGROUND STARS */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.7;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:0.2; transform:scale(1);}
    to{opacity:1; transform:scale(1.6);}
}

/* MOON */
.moon{
    position:absolute;
    top:60px;
    left:60px;

    width:80px;
    height:80px;

    background:radial-gradient(circle,#fff,#cfcfcf,#999);
    border-radius:50%;

    box-shadow:0 0 30px rgba(255,255,255,0.4);

    opacity:0.8;
}

</style>
</head>

<body>

<div class="title">❤️ For My Moon ❤️</div>

<div class="moon"></div>

<div class="container">

    <!-- CARD 1 -->
    <div class="card c1">
        <img class="cover" src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=300">
        <div class="song-title">یاد من عشقو بیار</div>
        <div class="artist">Song 1</div>
        <audio controls src="song1.mp3"></audio>
    </div>

    <!-- CARD 2 -->
    <div class="card c2">
        <img class="cover" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=300">
        <div class="song-title">رنگ تنت رنگ مسی</div>
        <div class="artist">Song 2</div>
        <audio controls src="song2.mp3"></audio>
    </div>

    <!-- CARD 3 -->
    <div class="card c3">
        <img class="cover" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300">
        <div class="song-title">ای خالق هر قصه من</div>
        <div class="artist">Song 3</div>
        <audio controls src="song3.mp3"></audio>
    </div>

    <!-- CARD 4 -->
    <div class="card c4">
        <img class="cover" src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=300">
        <div class="song-title">میترسم که بفهمم</div>
        <div class="artist">Song 4</div>
        <audio controls src="song4.mp3"></audio>
    </div>

</div>

<!-- STARS -->
<script>
for(let i=0;i<35;i++){
    let s=document.createElement("div");
    s.className="star";

    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";

    s.style.animationDuration=(Math.random()*2+1)+"s";

    document.body.appendChild(s);
}
</script>

</body>
</html>
