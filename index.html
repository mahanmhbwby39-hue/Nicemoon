.container{

.row{width:100%;display:flex;}

.card{

.row:nth-child(even) .card{
    animation-delay:2s;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0px);}
}

.card.playing{
    box-shadow:0 0 25px rgba(255,80,120,0.8);

.cover{

.cover.playing{

    to{transform:rotate(360deg);}

.song-title{

<script>

let currentAudio = null;
let currentBtn = null;

const ICON_PLAY = "▶";
const ICON_PAUSE = "❚❚";

document.querySelectorAll(".play-btn").forEach(btn => {

    btn.addEventListener("click", () => {

        const src = btn.dataset.src;
        const card = btn.closest(".card");
        const bar = card.querySelector(".bar");
        const cover = card.querySelector(".cover");

        if (currentAudio && currentBtn === btn) {
            if (!currentAudio.paused) {
                currentAudio.pause();
                btn.textContent = ICON_PLAY;
                card.classList.remove("playing");
                cover.classList.remove("playing");
                return;
            } else {
                currentAudio.play();
                btn.textContent = ICON_PAUSE;
                card.classList.add("playing");
                cover.classList.add("playing");
                return;
            }
        }

        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            if (currentBtn) currentBtn.textContent = ICON_PLAY;
        }

        currentAudio = new Audio(src);
        currentBtn = btn;
        currentAudio.play();

        document.querySelectorAll(".card").forEach(c => c.classList.remove("playing"));
        document.querySelectorAll(".cover").forEach(c => c.classList.remove("playing"));

        card.classList.add("playing");
        cover.classList.add("playing");
        btn.textContent = ICON_PAUSE;

        currentAudio.ontimeupdate = () => {
            if (!currentAudio.duration) return;
            let percent = (currentAudio.currentTime / currentAudio.duration) * 100;
            bar.style.width = percent + "%";
        };

        currentAudio.onended = () => {
            btn.textContent = ICON_PLAY;
            card.classList.remove("playing");
            cover.classList.remove("playing");
            bar.style.width = "0%";
        };

    });

});

</script>

<style>

}

  to{
    transform:translateX(-600px);
    opacity:0;
  }

  to{
    transform:translateX(600px);
    opacity:0;
  }

  position:absolute;

  mix-blend-mode: screen;
}
</style>

<script>
(function(){
  const container = document.getElementById("clouds");
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");

  canvas.width = innerWidth;
  canvas.height = innerHeight;

  window.addEventListener("resize", ()=>{
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  });

  /* ===== Clouds ===== */
  const count = 25;

  for(let i=0;i<count;i++){
    const cloud = document.createElement("div");
    cloud.className = "cloud";

    cloud.style.top = Math.random()*100 + "vh";
    cloud.style.left = Math.random()*100 + "vw";

    const scale = 0.6 + Math.random()*1.4;
    cloud.style.transform = `scale(${scale})`;

    cloud.classList.add(i % 2 === 0 ? "left" : "right");

    cloud.style.animationDelay = Math.random()*1.5 + "s";

    container.appendChild(cloud);
  }

  /* ===== Particles ===== */
  let particles = [];

  class Particle{
    constructor(x,y){
      this.x=x;
      this.y=y;
      this.size=Math.random()*3+1;
      this.speedX=(Math.random()-0.5)*6;
      this.speedY=(Math.random()-0.5)*6;
      this.life=60;
    }
    update(){
      this.x+=this.speedX;
      this.y+=this.speedY;
      this.life--;
    }
    draw(){
      ctx.fillStyle="white";
      ctx.shadowColor="white";
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fill();
    }
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
      p.update();
      p.draw();
      if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("click",(e)=>{
    for(let i=0;i<25;i++){
      particles.push(new Particle(e.clientX,e.clientY));
    }
  });

})();
</script>
