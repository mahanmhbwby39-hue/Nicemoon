<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiceMoon</title>

<style>
body{
    margin:0;
    min-height:100vh;
    overflow:auto;
    font-family:sans-serif;

    background:url("https://i.ibb.co/ynHWBxJ1/37885c25-930b-4c57-886c-8a65172ae807.png")
    no-repeat center center;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 0;
}

.container{
    width:90%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.card{
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 25px rgba(0,0,0,0.35);
    padding:25px;
    color:white;
    text-align:center;
}

.card:hover{
    transform:scale(1.03);
    transition:0.3s;
}

.cover{
    width:170px;
    height:170px;
    border-radius:20px;
    object-fit:cover;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.song-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

audio{
    width:100%;
}

@media(max-width:800px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="card">
        <img class="cover" src="https://picsum.photos/300?1">
        <div class="song-title">Perfect</div>
        <audio controls>
            <source src="song1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="card">
        <img class="cover" src="https://picsum.photos/300?2">
        <div class="song-title">Until I Found You</div>
        <audio controls>
            <source src="song2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="card">
        <img class="cover" src="https://picsum.photos/300?3">
        <div class="song-title">Photograph</div>
        <audio controls>
            <source src="song3.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="card">
        <img class="cover" src="https://picsum.photos/300?4">
        <div class="song-title">A Thousand Years</div>
        <audio controls>
            <source src="song4.mp3" type="audio/mpeg">
        </audio>
    </div>

</div>

</body>
</html>
