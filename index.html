<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiceMoon 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Vazirmatn',sans-serif;
    direction:rtl;
    min-height:100vh;
    overflow:hidden;
    background:url("https://i.ibb.co/ynHWBxJ1/37885c25-930b-4c57-886c-8a65172ae807.png")
    center/cover no-repeat fixed;
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:18px;
    padding:40px 20px;
}

.row{width:100%;display:flex;}
.row.right{justify-content:flex-end;}
.row.left{justify-content:flex-start;}

.card{
    width:270px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    color:white;
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
    transition:0.3s;
    animation: float 6s ease-in-out infinite;
}

.row:nth-child(even) .card{
    animation-delay:2s;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0px);}
}

.card.playing{
    box-shadow:0 0 25px rgba(255,80,120,0.8);
}

.cover{
    width:65px;
    height:65px;
    border-radius:50%;
    object-fit:cover;
    background:#222;
}

/* اگر عکس لود نشد */
.cover:not([src]){
    display:none;
}

.cover.playing{
    animation:spin 6s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.text{flex:1;}

.song-title{
    font-size:15px;
    font-weight:700;
}

.artist{
    font-size:11px;
    opacity:0.7;
}

.controls{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:8px;
}

.progress{
    flex:1;
    height:4px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
}

.progress .bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff4d6d,#ffd166);
}

.visualizer{
    display:flex;
    gap:2px;
    align-items:flex-end;
    height:14px;
}

.visualizer span{
    width:2px;
    height:4px;
    background:white;
    opacity:0.4;
    animation:beat 0.8s infinite ease-in-out;
}

.visualizer span:nth-child(2){animation-delay:0.1s;}
.visualizer span:nth-child(3){animation-delay:0.2s;}
.visualizer span:nth-child(4){animation-delay:0.3s;}

@keyframes beat{
    0%,100%{height:3px; opacity:0.3;}
    50%{height:14px; opacity:1;}
}

.card.playing .visualizer span{
    background:#ff4d6d;
    opacity:1;
}

.play-btn{
    width:32px;
    height:32px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.2s;
}

.play-btn:hover{
    background:rgba(255,255,255,0.35);
}

</style>
</head>

<body>

<div class="container">

    <div class="row right">
        <div class="card">
            <img class="cover" src="Cover1.png" onerror="this.src='https://via.placeholder.com/150'">
            <div class="text">
                <div class="song-title">یاد من عشقو بیار</div>
                <div class="artist">Song 1</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song1.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row left">
        <div class="card">
            <img class="cover" src="Cover2.png" onerror="this.src='https://via.placeholder.com/150'">
            <div class="text">
                <div class="song-title">رنگ تنت رنگ مسی</div>
                <div class="artist">Song 2</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song2.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row right">
        <div class="card">
            <img class="cover" src="Cover3.png" onerror="this.src='https://via.placeholder.com/150'">
            <div class="text">
                <div class="song-title">ای خالق هر قصه من</div>
                <div class="artist">Song 3</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song3.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row left">
        <div class="card">
            <img class="cover" src="Cover4.png" onerror="this.src='https://via.placeholder.com/150'">
            <div class="text">
                <div class="song-title">میترسم که بفهمم</div>
                <div class="artist">Song 4</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song4.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script>

let currentAudio = null;
let currentBtn = null;

const ICON_PLAY = "▶";
const ICON_PAUSE = "❚❚";

document.querySelectorAll(".play-btn").forEach(btn => {

    btn.addEventListener("click", () => {

        const src = btn.dataset.src;
        const card = btn.closest(".card");
        const bar = card.querySelector(".bar");
        const cover = card.querySelector(".cover");

        if (currentAudio && currentBtn === btn) {
            if (!currentAudio.paused) {
                currentAudio.pause();
                btn.textContent = ICON_PLAY;
                card.classList.remove("playing");
                cover.classList.remove("playing");
                return;
            } else {
                currentAudio.play();
                btn.textContent = ICON_PAUSE;
                card.classList.add("playing");
                cover.classList.add("playing");
                return;
            }
        }

        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            if (currentBtn) currentBtn.textContent = ICON_PLAY;
        }

        currentAudio = new Audio(src);
        currentBtn = btn;
        currentAudio.play();

        document.querySelectorAll(".card").forEach(c => c.classList.remove("playing"));
        document.querySelectorAll(".cover").forEach(c => c.classList.remove("playing"));

        card.classList.add("playing");
        cover.classList.add("playing");
        btn.textContent = ICON_PAUSE;

        currentAudio.ontimeupdate = () => {
            if (!currentAudio.duration) return;
            let percent = (currentAudio.currentTime / currentAudio.duration) * 100;
            bar.style.width = percent + "%";
        };

        currentAudio.onended = () => {
            btn.textContent = ICON_PLAY;
            card.classList.remove("playing");
            cover.classList.remove("playing");
            bar.style.width = "0%";
        };

    });

});

</script>

</body>
</html>
<!-- ===== Cloud Intro + Spark FX MODULE (FIXED TRANSPARENT) ===== -->

<div id="cloudburst-root">
  <div class="clouds" id="clouds"></div>
  <canvas id="fx"></canvas>
</div>

<style>
#cloudburst-root{
  position:fixed;
  inset:0;
  z-index:0; /* مهم: پشت UI */
  overflow:hidden;
  pointer-events:none;
  background:transparent; /* 👈 حذف بک‌گراند */
}

/* Clouds */
#cloudburst-root .cloud{
  position:absolute;
  width:220px;
  height:130px;
  background:#fff;
  border-radius:100px;
  filter:blur(1px);
  opacity:0.6; /* 👈 ملایم‌تر برای طبیعی شدن */
}

#cloudburst-root .cloud::before,
#cloudburst-root .cloud::after{
  content:"";
  position:absolute;
  background:#fff;
  border-radius:50%;
}

#cloudburst-root .cloud::before{
  width:120px;
  height:120px;
  top:-40px;
  left:25px;
}

#cloudburst-root .cloud::after{
  width:150px;
  height:150px;
  top:-60px;
  left:90px;
}

#cloudburst-root .cloud.left{
  animation:cbLeft 2.2s ease-in-out forwards;
}

#cloudburst-root .cloud.right{
  animation:cbRight 2.2s ease-in-out forwards;
}

@keyframes cbLeft{
  to{
    transform:translateX(-600px);
    opacity:0;
  }
}

@keyframes cbRight{
  to{
    transform:translateX(600px);
    opacity:0;
  }
}

/* Canvas */
#cloudburst-root canvas{
  position:absolute;
  inset:0;
}

/* optional: softer spark look */
#cloudburst-root{
  mix-blend-mode: screen;
}
</style>

<script>
(function(){
  const container = document.getElementById("clouds");
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");

  canvas.width = innerWidth;
  canvas.height = innerHeight;

  window.addEventListener("resize", ()=>{
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  });

  /* ===== Clouds ===== */
  const count = 25;

  for(let i=0;i<count;i++){
    const cloud = document.createElement("div");
    cloud.className = "cloud";

    cloud.style.top = Math.random()*100 + "vh";
    cloud.style.left = Math.random()*100 + "vw";

    const scale = 0.6 + Math.random()*1.4;
    cloud.style.transform = `scale(${scale})`;

    cloud.classList.add(i % 2 === 0 ? "left" : "right");

    cloud.style.animationDelay = Math.random()*1.5 + "s";

    container.appendChild(cloud);
  }

  /* ===== Particles ===== */
  let particles = [];

  class Particle{
    constructor(x,y){
      this.x=x;
      this.y=y;
      this.size=Math.random()*3+1;
      this.speedX=(Math.random()-0.5)*6;
      this.speedY=(Math.random()-0.5)*6;
      this.life=60;
    }
    update(){
      this.x+=this.speedX;
      this.y+=this.speedY;
      this.life--;
    }
    draw(){
      ctx.fillStyle="white";
      ctx.shadowColor="white";
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fill();
    }
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
      p.update();
      p.draw();
      if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("click",(e)=>{
    for(let i=0;i<25;i++){
      particles.push(new Particle(e.clientX,e.clientY));
    }
  });

})();
</script>

<!-- ===== END MODULE ===== -->

<style>

/* ===== Premium Shine Effect ===== */

.card{
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-120%;
    width:70px;
    height:250%;
    transform:rotate(25deg);

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.45),
        rgba(255,255,255,0.05),
        transparent
    );

    animation:cardShine 5s infinite ease-in-out;
    pointer-events:none;
}

.card:nth-child(2)::before{
    animation-delay:1s;
}

.card:nth-child(3)::before{
    animation-delay:2s;
}

.card:nth-child(4)::before{
    animation-delay:3s;
}

@keyframes cardShine{
    0%{
        left:-120%;
        opacity:0;
    }

    15%{
        opacity:1;
    }

    40%{
        left:140%;
        opacity:0.9;
    }

    100%{
        left:140%;
        opacity:0;
    }
}

</style>
