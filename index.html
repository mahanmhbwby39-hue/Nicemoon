<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiceMoon 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= ORIGINAL STYLE (UNCHANGED) ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Vazirmatn',sans-serif;
    direction:rtl;
    min-height:100vh;
    overflow:hidden;
    background:url("https://i.ibb.co/ynHWBxJ1/37885c25-930b-4c57-886c-8a65172ae807.png")
    center/cover no-repeat fixed;
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:18px;
    padding:40px 20px;
}

.row{width:100%;display:flex;}
.row.right{justify-content:flex-end;}
.row.left{justify-content:flex-start;}

.card{
    width:270px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    color:white;
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
    transition:0.3s;
    animation: float 6s ease-in-out infinite;
}

.row:nth-child(even) .card{
    animation-delay:2s;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0px);}
}

.cover{
    width:65px;
    height:65px;
    border-radius:50%;
    object-fit:cover;
}

.text{flex:1;}

.song-title{font-size:15px;font-weight:700;}
.artist{font-size:11px;opacity:0.7;}

.controls{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:8px;
}

.progress{
    flex:1;
    height:4px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
}

.progress .bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff4d6d,#ffd166);
}

.play-btn{
    width:32px;
    height:32px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:12px;
    transition:0.2s;
}

.play-btn:hover{
    background:rgba(255,255,255,0.35);
}

/* ================= MODAL (READY FOR STEP 2) ================= */

.player-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(15px);
    display:flex;
    align-items:center;
    justify-content:center;

    transform:scale(0);
    opacity:0;
    transition:0.4s;
    z-index:999;
}

.player-modal.active{
    transform:scale(1);
    opacity:1;
}

.player-box{
    width:340px;
    height:420px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 40px rgba(255,80,120,0.4);
    position:relative;
    overflow:hidden;

    transform:rotateX(25deg) scale(0.8);
    transition:0.5s;
}

.player-modal.active .player-box{
    transform:rotateX(0) scale(1);
}

#closePlayer{
    position:absolute;
    top:10px;
    right:10px;
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

    <!-- ===== SONG 1 ===== -->
    <div class="row right">
        <div class="card">
            <img class="cover" src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=300">

            <div class="text">
                <div class="song-title">یاد من عشقو بیار</div>
                <div class="artist">Song 1</div>

                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>

                    <button class="play-btn"
                        data-src="song1.mp3"
                        data-title="یاد من عشقو بیار"
                        data-cover="https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=300">
                        ▶
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SONG 2 ===== -->
    <div class="row left">
        <div class="card">
            <img class="cover" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=300">

            <div class="text">
                <div class="song-title">رنگ تنت رنگ مسی</div>
                <div class="artist">Song 2</div>

                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>

                    <button class="play-btn"
                        data-src="song2.mp3"
                        data-title="رنگ تنت رنگ مسی"
                        data-cover="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=300">
                        ▶
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SONG 3 ===== -->
    <div class="row right">
        <div class="card">
            <img class="cover" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300">

            <div class="text">
                <div class="song-title">ای خالق هر قصه من</div>
                <div class="artist">Song 3</div>

                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>

                    <button class="play-btn"
                        data-src="song3.mp3"
                        data-title="ای خالق هر قصه من"
                        data-cover="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300">
                        ▶
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SONG 4 (FIXED) ===== -->
    <div class="row left">
        <div class="card">
            <img class="cover" src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=300">

            <div class="text">
                <div class="song-title">میترسم که بفهمم</div>
                <div class="artist">Song 4</div>

                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>

                    <button class="play-btn"
                        data-src="song4.mp3"
                        data-title="میترسم که بفهمم"
                        data-cover="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=300">
                        ▶
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- ===== PLAYER MODAL (STEP 2 READY) ===== -->
<div id="playerModal" class="player-modal">
    <div class="player-box">
        <button id="closePlayer">✖</button>
    </div>
</div>

<script>

/* ================= STEP 1 LOGIC ONLY ================= */

const modal = document.getElementById("playerModal");
const closeBtn = document.getElementById("closePlayer");
const buttons = document.querySelectorAll(".play-btn");

let currentAudio = null;

buttons.forEach(btn => {

    btn.addEventListener("click", () => {

        const src = btn.dataset.src;
        const title = btn.dataset.title;
        const cover = btn.dataset.cover;

        // open modal with 3D effect
        modal.classList.add("active");

        // stop previous audio if exists
        if(currentAudio){
            currentAudio.pause();
        }

        // create new audio
        currentAudio = new Audio(src);
        currentAudio.play();

        console.log("Now Playing:", title);

    });

});

closeBtn.addEventListener("click", () => {
    modal.classList.remove("active");

    if(currentAudio){
        currentAudio.pause();
    }
});

</script>

</body>
</html>
