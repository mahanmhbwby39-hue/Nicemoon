<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiceMoon 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    font-family:'Vazirmatn',sans-serif;
    direction:rtl;

    background:url("https://i.ibb.co/ynHWBxJ1/37885c25-930b-4c57-886c-8a65172ae807.png")
    center center/cover no-repeat fixed;
}

.now-playing{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    color:white;
    padding:10px 20px;
    border-radius:999px;
    z-index:9999;
    font-size:14px;
}

.card{
    position:absolute;
    width:240px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;

    padding:12px;
    text-align:center;

    color:white;

    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.card.playing{
    box-shadow:0 0 25px rgba(180,120,255,0.8);
}

.cover{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
}

.cover.playing{
    animation:spin 8s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.song-title{
    margin-top:10px;
    font-size:18px;
    font-weight:700;
}

.artist{
    margin-top:5px;
    font-size:12px;
    opacity:0.7;
}

audio{
    width:100%;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="now-playing">❤️ For My Moon ❤️</div>

<!-- CARDS -->
<div class="card">
    <img class="cover" src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=600">
    <div class="song-title">یاد من عشقو بیار</div>
    <div class="artist">Song 1</div>
    <audio controls><source src="song1.mp3"></audio>
</div>

<div class="card">
    <img class="cover" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600">
    <div class="song-title">رنگ تنت رنگ مسی</div>
    <div class="artist">Song 2</div>
    <audio controls><source src="song2.mp3"></audio>
</div>

<div class="card">
    <img class="cover" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600">
    <div class="song-title">ای خالق هر قصه من</div>
    <div class="artist">Song 3</div>
    <audio controls><source src="song3.mp3"></audio>
</div>

<div class="card">
    <img class="cover" src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=600">
    <div class="song-title">میترسم که بفهمم</div>
    <div class="artist">Song 4</div>
    <audio controls><source src="song4.mp3"></audio>
</div>

<script>

const cards = document.querySelectorAll(".card");
const audios = document.querySelectorAll("audio");

const state = [];

function random(min,max){
    return Math.random()*(max-min)+min;
}

// init positions
cards.forEach((card,i)=>{

    state[i] = {
        x: random(50, window.innerWidth-300),
        y: random(80, window.innerHeight-300),
        dx: random(0.3,0.7)*(Math.random()>0.5?1:-1),
        dy: random(0.3,0.7)*(Math.random()>0.5?1:-1)
    };

    card.style.left = state[i].x + "px";
    card.style.top = state[i].y + "px";
});

function loop(){

    cards.forEach((card,i)=>{

        state[i].x += state[i].dx;
        state[i].y += state[i].dy;

        const w = card.offsetWidth;
        const h = card.offsetHeight;

        if(state[i].x <= 0 || state[i].x + w >= window.innerWidth){
            state[i].dx *= -1;
        }

        if(state[i].y <= 60 || state[i].y + h >= window.innerHeight){
            state[i].dy *= -1;
        }

        card.style.left = state[i].x + "px";
        card.style.top = state[i].y + "px";
    });

    // collision
    for(let i=0;i<cards.length;i++){
        for(let j=i+1;j<cards.length;j++){

            const a = cards[i].getBoundingClientRect();
            const b = cards[j].getBoundingClientRect();

            if(
                a.left < b.right &&
                a.right > b.left &&
                a.top < b.bottom &&
                a.bottom > b.top
            ){
                [state[i].dx, state[j].dx] = [state[j].dx, state[i].dx];
                [state[i].dy, state[j].dy] = [state[j].dy, state[i].dy];
            }
        }
    }

    requestAnimationFrame(loop);
}

loop();

// فقط یک موزیک همزمان
audios.forEach(audio=>{

    audio.addEventListener("play",()=>{

        audios.forEach(a=>{
            if(a!==audio) a.pause();
        });

        document.querySelectorAll(".cover").forEach(c=>{
            c.classList.remove("playing");
        });

        document.querySelectorAll(".card").forEach(c=>{
            c.classList.remove("playing");
        });

        audio.parentElement.querySelector(".cover").classList.add("playing");
        audio.parentElement.classList.add("playing");
    });

});

</script>

</body>
</html>
