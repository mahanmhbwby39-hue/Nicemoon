<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiceMoon</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;

    background:url("https://i.ibb.co/ynHWBxJ1/37885c25-930b-4c57-886c-8a65172ae807.png")
    no-repeat center center;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:120px;
}

.card{
    height:170px;
    border-radius:25px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:22px;
    text-align:center;

    box-shadow:0 0 25px rgba(0,0,0,0.35);
    padding:20px;
}

.card:hover{
    transform:scale(1.03);
    transition:0.3s;
}
</style>

</head>

<body>

<div class="container">

    <div class="card">
        Every night becomes beautiful when I think of you ❤️
    </div>

    <div class="card">
        You are the moon that lights my darkest skies 🌙
    </div>

    <div class="card">
        My favorite place is wherever you are ✨
    </div>

    <div class="card">
        In every universe, I would choose you again 💖
    </div>

</div>

</body>
</html>
