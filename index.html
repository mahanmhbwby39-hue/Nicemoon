<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiceMoon 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Vazirmatn',sans-serif;
    direction:rtl;
    min-height:100vh;
    overflow:hidden;
    background:url("https://i.ibb.co/ynHWBxJ1/37885c25-930b-4c57-886c-8a65172ae807.png")
    center/cover no-repeat fixed;
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:18px;
    padding:40px 20px;
}

.row{width:100%;display:flex;}
.row.right{justify-content:flex-end;}
.row.left{justify-content:flex-start;}

.card{
    width:270px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    color:white;
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
    transition:0.3s;
    animation: float 6s ease-in-out infinite;
}

.row:nth-child(even) .card{
    animation-delay:2s;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0px);}
}

.card.playing{
    box-shadow:0 0 25px rgba(255,80,120,0.8);
}

.cover{
    width:65px;
    height:65px;
    border-radius:50%;
    object-fit:cover;
}

.cover.playing{
    animation:spin 6s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.text{flex:1;}

.song-title{
    font-size:15px;
    font-weight:700;
}

.artist{
    font-size:11px;
    opacity:0.7;
}

.controls{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:8px;
}

.progress{
    flex:1;
    height:4px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
}

.progress .bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff4d6d,#ffd166);
}

.visualizer{
    display:flex;
    gap:2px;
    align-items:flex-end;
    height:14px;
}

.visualizer span{
    width:2px;
    height:4px;
    background:white;
    opacity:0.4;
    animation:beat 0.8s infinite ease-in-out;
}

.visualizer span:nth-child(2){animation-delay:0.1s;}
.visualizer span:nth-child(3){animation-delay:0.2s;}
.visualizer span:nth-child(4){animation-delay:0.3s;}

@keyframes beat{
    0%,100%{height:3px; opacity:0.3;}
    50%{height:14px; opacity:1;}
}

.card.playing .visualizer span{
    background:#ff4d6d;
    opacity:1;
}

.play-btn{
    width:32px;
    height:32px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.2s;
}

.play-btn:hover{
    background:rgba(255,255,255,0.35);
}

</style>
</head>

<body>

<div class="container">

    <div class="row right">
        <div class="card">
            <img class="cover" src="cover1.png">
            <div class="text">
                <div class="song-title">یاد من عشقو بیار</div>
                <div class="artist">Song 1</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song1.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row left">
        <div class="card">
            <img class="cover" src="cover2.png">
            <div class="text">
                <div class="song-title">رنگ تنت رنگ مسی</div>
                <div class="artist">Song 2</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song2.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row right">
        <div class="card">
            <img class="cover" src="cover3.png">
            <div class="text">
                <div class="song-title">ای خالق هر قصه من</div>
                <div class="artist">Song 3</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song3.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row left">
        <div class="card">
            <img class="cover" src="cover4.png">
            <div class="text">
                <div class="song-title">میترسم که بفهمم</div>
                <div class="artist">Song 4</div>
                <div class="controls">
                    <div class="progress"><div class="bar"></div></div>
                    <div class="visualizer"><span></span><span></span><span></span><span></span></div>
                    <button class="play-btn" data-src="song4.mp3">▶</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script>

let currentAudio = null;
let currentBtn = null;

const ICON_PLAY = "▶";
const ICON_PAUSE = "❚❚";

document.querySelectorAll(".play-btn").forEach(btn => {

    btn.addEventListener("click", () => {

        const src = btn.dataset.src;
        const card = btn.closest(".card");
        const bar = card.querySelector(".bar");
        const cover = card.querySelector(".cover");

        if (currentAudio && currentBtn === btn) {
            if (!currentAudio.paused) {
                currentAudio.pause();
                btn.textContent = ICON_PLAY;
                card.classList.remove("playing");
                cover.classList.remove("playing");
                return;
            } else {
                currentAudio.play();
                btn.textContent = ICON_PAUSE;
                card.classList.add("playing");
                cover.classList.add("playing");
                return;
            }
        }

        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            if (currentBtn) currentBtn.textContent = ICON_PLAY;
        }

        currentAudio = new Audio(src);
        currentBtn = btn;
        currentAudio.play();

        document.querySelectorAll(".card").forEach(c => c.classList.remove("playing"));
        document.querySelectorAll(".cover").forEach(c => c.classList.remove("playing"));

        card.classList.add("playing");
        cover.classList.add("playing");
        btn.textContent = ICON_PAUSE;

        currentAudio.ontimeupdate = () => {
            if (!currentAudio.duration) return;
            let percent = (currentAudio.currentTime / currentAudio.duration) * 100;
            bar.style.width = percent + "%";
        };

        currentAudio.onended = () => {
            btn.textContent = ICON_PLAY;
            card.classList.remove("playing");
            cover.classList.remove("playing");
            bar.style.width = "0%";
        };

    });

});

</script>

</body>
</html>
